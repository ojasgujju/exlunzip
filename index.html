<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SheetUnlocker Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #6366f1;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="max-w-xl w-full p-6 bg-gray-800 rounded-2xl shadow-xl">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold">SheetUnlocker Pro</h1>
        <p class="text-gray-400 mt-2">Remove Excel sheet protection instantly</p>
    </div>

    <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center hover:border-indigo-500 transition">
        <input id="fileInput" type="file" accept=".xlsx" class="hidden" />
        <label for="fileInput" class="cursor-pointer">
            <p class="text-gray-300">Click to upload Excel file</p>
        </label>
    </div>

    <div id="fileName" class="mt-3 text-sm text-gray-400"></div>

    <button id="uploadBtn"
        class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-semibold transition">
        Unlock Sheets
    </button>

    <div id="loader" class="hidden flex justify-center mt-6">
        <div class="loader"></div>
    </div>

    <a id="downloadLink" class="hidden block mt-6 text-center bg-green-600 py-3 rounded-xl">
        Download Unlocked File
    </a>

    <div class="mt-8 text-xs text-gray-500 text-center">
        XML-level unlocking • No password required
    </div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const loader = document.getElementById("loader");
const downloadLink = document.getElementById("downloadLink");
const fileNameText = document.getElementById("fileName");

let selectedFile = null;

fileInput.addEventListener("change", () => {
    selectedFile = fileInput.files[0];
    fileNameText.innerText = selectedFile ? selectedFile.name : "";
});

uploadBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    loader.classList.remove("hidden");
    downloadLink.classList.add("hidden");

    const formData = new FormData();
    formData.append("file", selectedFile);

    const res = await fetch("/api/unlock", {
        method: "POST",
        body: formData
    });

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    downloadLink.href = url;
    downloadLink.download = selectedFile.name.replace(".xlsx", "_unlocked.xlsx");
    downloadLink.classList.remove("hidden");

    loader.classList.add("hidden");
});
</script>

</body>
</html>
